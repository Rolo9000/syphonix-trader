version: '3.8'

networks:
  trader-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - trader-net

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - redis
    networks:
      - trader-net
    restart: unless-stopped
